<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CerebroCortex — Alchemical Memory</title>
<link rel="stylesheet" href="css/main.css">
<script src="https://unpkg.com/three@0.158.0/build/three.min.js"></script>
<script src="https://unpkg.com/three-spritetext@1.8.2/dist/three-spritetext.min.js"></script>
<script src="https://unpkg.com/3d-force-graph@1.73.3/dist/3d-force-graph.min.js"></script>
</head>
<body>
<canvas id="particle-canvas"></canvas>

<!-- Toast container -->
<div id="toast-container"></div>

<!-- Sidebar -->
<nav id="sidebar">
  <div class="nav-logo" onclick="app.nav('cortex')">☯</div>
  <button class="nav-btn active" data-tab="cortex" onclick="app.nav('cortex')">
    ☼<span class="tooltip">Cortex</span>
  </button>
  <button class="nav-btn" data-tab="memories" onclick="app.nav('memories')">
    ⚛<span class="tooltip">Memories</span>
  </button>
  <button class="nav-btn" data-tab="ingest" onclick="app.nav('ingest')">
    ⚡<span class="tooltip">Ingest</span>
  </button>
  <button class="nav-btn" data-tab="graph" onclick="app.nav('graph')">
    ☉<span class="tooltip">Graph</span>
  </button>
  <button class="nav-btn" data-tab="trash" onclick="app.nav('trash')">
    ☠<span class="tooltip">Trash</span>
  </button>
  <button class="nav-btn" data-tab="tags" onclick="app.nav('tags')">
    ✵<span class="tooltip">Tags</span>
  </button>
  <button class="nav-btn" data-tab="threads" onclick="app.nav('threads')">
    ♛<span class="tooltip">Threads</span>
  </button>
  <button class="nav-btn" data-tab="dream" onclick="app.nav('dream')">
    ☽<span class="tooltip">Dream</span>
  </button>
  <button class="nav-btn" data-tab="decay" onclick="app.nav('decay')">
    ☠<span class="tooltip">Decay</span>
  </button>
  <button class="nav-btn" data-tab="health" onclick="app.nav('health')">
    ♨<span class="tooltip">Health</span>
  </button>
  <button class="nav-btn" data-tab="audit" onclick="app.nav('audit')">
    ✶<span class="tooltip">Audit</span>
  </button>
  <div class="nav-spacer"></div>
  <button class="nav-btn" data-tab="settings" onclick="app.nav('settings')">
    ⚙<span class="tooltip">Settings</span>
  </button>
  <div id="ws-status"></div>
</nav>

<!-- Main -->
<main id="main">
  <header id="header">
    <h1>CerebroCortex</h1>
    <div class="header-spacer"></div>
    <span class="header-stat">Memories <b id="stat-memories">-</b></span>
    <span class="header-stat">Links <b id="stat-links">-</b></span>
    <span class="header-stat">Episodes <b id="stat-episodes">-</b></span>
    <div id="watch-toggle" onclick="app.toggleWatch()">
      <span class="dot"></span>
      <span id="watch-label">Watcher</span>
    </div>
  </header>

  <!-- Cortex Panel -->
  <div class="panel active" id="panel-cortex">
    <div class="panel-body" id="cortex-body"></div>
  </div>

  <!-- Memories Panel -->
  <div class="panel" id="panel-memories">
    <div class="panel-header">
      <h2>⚛ Memory Vault</h2>
      <button class="btn primary small" onclick="app.nav('store')">">Store New</button>
    </div>
    <div class="panel-body" id="memories-body"></div>
  </div>

  <!-- Store Panel -->
  <div class="panel" id="panel-store">
    <div class="panel-header"><h2>⚛ Store Memory</h2></div>
    <div class="panel-body" id="store-body"></div>
  </div>

  <!-- Ingest Panel -->
  <div class="panel" id="panel-ingest">
    <div class="panel-header"><h2>⚡ Ingest Files</h2></div>
    <div class="panel-body" id="ingest-body"></div>
  </div>

  <!-- Graph Panel -->
  <div class="panel" id="panel-graph">
    <div class="panel-header">
      <h2>☉ Associative Graph</h2>
      <button class="btn small" id="render-mode-btn" onclick="graphPanel.toggleRenderMode()">2D / 3D</button>
    </div>
    <div class="panel-body" id="graph-body" style="padding: 0;"></div>
  </div>

  <!-- Trash Panel -->
  <div class="panel" id="panel-trash">
    <div class="panel-header"><h2>☠ The Ash Heap</h2></div>
    <div class="panel-body" id="trash-body"></div>
  </div>

  <!-- Tags Panel -->
  <div class="panel" id="panel-tags">
    <div class="panel-header"><h2>✵ Sigils</h2></div>
    <div class="panel-body" id="tags-body"></div>
  </div>

  <!-- Threads Panel -->
  <div class="panel" id="panel-threads">
    <div class="panel-header"><h2>♛ Threads</h2></div>
    <div class="panel-body" id="threads-body"></div>
  </div>

  <!-- Dream Panel -->
  <div class="panel" id="panel-dream">
    <div class="panel-header"><h2>☽ Oneiros</h2></div>
    <div class="panel-body" id="dream-body"></div>
  </div>

  <!-- Decay Panel -->
  <div class="panel" id="panel-decay">
    <div class="panel-body" id="decay-body"></div>
  </div>

  <!-- Health Panel -->
  <div class="panel" id="panel-health">
    <div class="panel-header"><h2>♨ Vital Signs</h2></div>
    <div class="panel-body" id="health-body"></div>
  </div>

  <!-- Settings Panel -->
  <div class="panel" id="panel-settings">
    <div class="panel-header"><h2>⚙ Configuration</h2></div>
    <div class="panel-body" id="settings-body"></div>
  </div>

  <!-- Audit Panel -->
  <div class="panel" id="panel-audit">
    <div class="panel-body" id="audit-body"></div>
  </div>
</main>

<!-- Modal overlay -->
<div id="modal-overlay" class="modal-overlay" onclick="if(event.target===this)app.closeModal()"></div>

<script src="js/api.js"></script>
<script src="js/panels/cortex.js"></script>
<script src="js/panels/memories.js"></script>
<script src="js/panels/store.js"></script>
<script src="js/panels/ingest.js"></script>
<script src="js/panels/graph.js"></script>
<script src="js/panels/trash.js"></script>
<script src="js/panels/tags.js"></script>
<script src="js/panels/threads.js"></script>
<script src="js/panels/dream.js"></script>
<script src="js/panels/decay.js"></script>
<script src="js/panels/health.js"></script>
<script src="js/panels/settings.js"></script>
<script src="js/panels/audit.js"></script>
<script src="js/app.js"></script>
</body>
</html>
